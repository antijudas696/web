<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0),
                radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 3rem 2rem;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background-color: #222222;
            border: 1px solid #333333;
            margin-bottom: 2rem;
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.5rem 1rem;
            background-color: #1c1c1c;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            color: #e5e5e5;
        }

        .indicator {
            width: 6px;
            height: 6px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24">
                <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
        </div>
        <h1>System Upgrades in Progress</h1>
        <p>We are fine-tuning our infrastructure to bring you a faster, more reliable experience. We will be back online shortly.</p>
        <div class="badge">
            <span class="indicator"></span>
            Maintenance Mode
        </div>
    </div>

</body>
</html>
